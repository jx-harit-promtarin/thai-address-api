name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 3 */3 * *'   # ทุก 3 วัน เวลา 03:00 UTC (~10:00 น. เวลาไทย)
  workflow_dispatch:         # กดรันเองได้จาก tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "https://onipthuciutummxseytg.supabase.co/rest/v1/province?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"